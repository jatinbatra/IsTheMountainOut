    <path d="M100,52 L110,84 L104,84 L112,104 L88,104 L96,84 L90,84 Z"/>
    <path d="M78,66 L86,92 L81,92 L88,108 L68,108 L75,92 L70,92 Z" opacity="0.85"/>
    <path d="M122,66 L130,92 L125,92 L132,108 L112,108 L119,92 L114,92 Z" opacity="0.85"/>
  </g>
  <rect x="96" y="104" width="8" height="8" fill="#e0a96d"/>
