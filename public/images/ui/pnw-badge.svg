<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <style>.g{fill:none;stroke:#e0a96d;stroke-width:1.5}</style>
  </defs>
  <circle cx="100" cy="100" r="92" class="g"/>
  <circle cx="100" cy="100" r="78" class="g" stroke-width="1"/>
  <!-- arched top text -->
  <path id="top" d="M40,100 A60,60 0 0 1 160,100" fill="none"/>
  <text fill="#e0a96d" font-family="Georgia, serif" font-size="13" font-weight="700" letter-spacing="3">
    <textPath href="#top" startOffset="50%" text-anchor="middle">PACIFIC NORTHWEST</textPath>
  </text>
  <!-- bottom text -->
  <text x="100" y="150" fill="#e0a96d" font-family="Georgia, serif" font-size="13" font-weight="700"
        letter-spacing="6" text-anchor="middle">PNW</text>
